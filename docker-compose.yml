version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: scct-postgres
    environment:
      POSTGRES_USER: scct
      POSTGRES_PASSWORD: scct_dev_2024
      POSTGRES_DB: scct_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scct -d scct_db"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
